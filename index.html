<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evidence energií | Terminál</title>
    <!-- Zde je ?v=2 pro vynucení obejití cache prohlížeče -->
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <h1>SYS_EVIDENCE</h1>
        </header>

        <section class="add-record panel">
            <h2>> NOVÝ ZÁZNAM</h2>
            <form id="recordForm">
                <div class="form-group">
                    <label for="category">Kategorie</label>
                    <select id="category" required>
                        <option value="voda">VODA [m³]</option>
                        <option value="plyn">PLYN [m³]</option>
                        <option value="elektrina">ELEKTŘINA [kWh]</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Datum odečtu</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="value">Stav počítadla</label>
                    <input type="number" step="0.01" id="value" required placeholder="0.00">
                </div>
                <button type="submit" class="btn-primary">ULOŽIT DATA</button>
            </form>
        </section>

        <section class="filters panel">
            <h2>> FILTR ZÁZNAMŮ</h2>
            <div class="form-group">
                <label for="period">Aktivní období</label>
                <select id="period">
                    <option value="all">VŠECHNY ZÁZNAMY</option>
                    <option value="week">POSLEDNÍCH 7 DNÍ</option>
                    <option value="month">POSLEDNÍCH 30 DNÍ</option>
                    <option value="year">AKTUÁLNÍ ROK</option>
                    <option value="custom">VLASTNÍ ROZSAH...</option>
                </select>
            </div>

            <div id="custom-dates" style="display: none;">
                <div class="form-group">
                    <label for="date-from">Od</label>
                    <input type="date" id="date-from">
                </div>
                <div class="form-group">
                    <label for="date-to">Do</label>
                    <input type="date" id="date-to">
                </div>
            </div>
        </section>

        <section class="records-display">
            <div class="category-section panel" id="voda-section">
                <h3>[ VODA ]</h3>
                <div class="summary">Celková spotřeba: <span id="voda-total">0 m³</span></div>
                <table id="table-voda">
                    <thead>
                        <tr><th>Datum</th><th>Stav</th><th>Nová spotřeba</th><th>Akce</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="category-section panel" id="plyn-section">
                <h3>[ PLYN ]</h3>
                <div class="summary">Celková spotřeba: <span id="plyn-total">0 m³</span></div>
                <table id="table-plyn">
                    <thead>
                        <tr><th>Datum</th><th>Stav</th><th>Nová spotřeba</th><th>Akce</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="category-section panel" id="elektrina-section">
                <h3>[ ELEKTŘINA ]</h3>
                <div class="summary">Celková spotřeba: <span id="elektrina-total">0 kWh</span></div>
                <table id="table-elektrina">
                    <thead>
                        <tr><th>Datum</th><th>Stav</th><th>Nová spotřeba</th><th>Akce</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Zde je ?v=2 pro vynucení načtení nového javascriptu -->
    <script src="script.js?v=2"></script>
</body>
</html>
